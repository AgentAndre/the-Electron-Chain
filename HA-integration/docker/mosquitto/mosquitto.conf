# Mosquitto config for the ELP test fleet.
# Plain-text auth disabled — anonymous-only inside the docker network.

listener 1883 0.0.0.0
allow_anonymous true

persistence true
persistence_location /mosquitto/data/

log_dest stdout
log_type warning
log_type notice
log_type information

# Reasonable limits for a 10-instance fleet
max_queued_messages 10000
message_size_limit 65536
