name: "TheElectronChain"
version: "5.0.0"
slug: "the_electron_chain"
description: "ELP-Hub: order book, matching engine, persistence & cooperative cockpit for §42c MaLo communities on the peaq blockchain"
url: "https://github.com/heutestadtmorgen/electron-chain"
arch:
  - armhf
  - armv7
  - aarch64
  - amd64
  - i386
init: false
startup: application
boot: auto
options:
  # ===== Cooperative identity =====
  coop_id: "heutestadtmorgen"

  # ===== MQTT broker (Mosquitto addon by default) =====
  mqtt_host: "core-mosquitto"
  mqtt_port: 1883
  mqtt_username: ""
  mqtt_password: ""

  # ===== Matching engine =====
  match_interval_sec: 15
  grid_price_default_ct: 32.0
  heartbeat_prune_sec: 86400

  # ===== HTTP API / dashboard / WebSocket =====
  hub_api_port: 8099

  # ===== Runtime =====
  log_level: "info"
  timezone: "Europe/Berlin"

schema:
  coop_id: str
  mqtt_host: str
  mqtt_port: int(1,65535)
  mqtt_username: str?
  mqtt_password: password?
  match_interval_sec: int(5,3600)
  grid_price_default_ct: float(0.0,200.0)
  heartbeat_prune_sec: int(3600,2592000)
  hub_api_port: int(1024,65535)
  log_level: list(debug|info|warning|error)?
  timezone: str?

services:
  - mqtt:need
ports:
  8099/tcp: 8099
ports_description:
  8099/tcp: ELP-Hub HTTP + WebSocket + Cooperative Cockpit
homeassistant_api: true
hassio_api: true
hassio_role: default
